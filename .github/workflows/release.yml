name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build EXE
      run: python build_exe.py
    - name: Upload Artifact
      uses: actions/upload-artifact@v4   # v3→v4に修正
      with:
        name: windows-binary
        path: dist/DesktopAI.exe

  build-linux:
    runs-on: ubuntu-20.04 # 古いOSでビルドして互換性を高める
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        # 20.04なので元の libasound2 でOK
        sudo apt-get install -y libpulse0 libasound2 fuse libfuse2
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build Binary
      run: python build_exe.py
    - name: Create AppImage
      run: |
        mkdir -p AppDir/usr/bin
        cp dist/DesktopAI AppDir/usr/bin/
        chmod +x AppDir/usr/bin/DesktopAI
        cat > AppDir/DesktopAI.desktop << 'EOF'
        [Desktop Entry]
        Name=Desktop AI
        Exec=DesktopAI
        Icon=icon
        Type=Application
        Categories=Utility;
        EOF
        # ダミーアイコン（なければエラーになるため）
        touch AppDir/icon.png
        cat > AppDir/AppRun << 'EOF'
        #!/bin/bash
        HERE="$(dirname "$(readlink -f "${0}")")"
        exec "$HERE/usr/bin/DesktopAI" "$@"
        EOF
        chmod +x AppDir/AppRun
        # appimagetoolのダウンロード（最新の安定版を使用）
        curl -L -o appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool
        
        # AppImageのビルド実行
        # --appimage-extract-and-run はDocker/GitHub Actions環境で必要
        ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir DesktopAI-x86_64.AppImage
    - name: Upload Artifact
      uses: actions/upload-artifact@v4   # v3→v4に修正
      with:
        name: linux-appimage
        path: DesktopAI-x86_64.AppImage

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4  # v3→v4に修正
      with:
        name: windows-binary
    - name: Download Linux Artifact
      uses: actions/download-artifact@v4  # v3→v4に修正
      with:
        name: linux-appimage
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          DesktopAI.exe
          DesktopAI-x86_64.AppImage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
